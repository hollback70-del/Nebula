<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Satellite Interceptor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: monospace; }
        body { background: #020202; color: #00ffff; padding: 20px; text-align: center; }
        .panel { max-width: 900px; margin: 0 auto; border: 2px solid #00ffff; background: #000; padding: 25px; box-shadow: 0 0 20px rgba(0,255,255,0.2); }
        .dish-radar { width: 150px; height: 150px; border: 4px dashed #00ffff; border-radius: 50%; margin: 20px auto; animation: spin 4s linear infinite; position: relative; }
        .dish-radar::after { content: ''; position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; background: #ff0055; border-radius: 50%; transform: translate(-50%, -50%); }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .freq-bar { width: 100%; background: #111; height: 25px; border: 1px solid #00ffff; margin: 15px 0; position: relative; overflow: hidden; }
        .freq-fill { height: 100%; background: rgba(0,255,255,0.3); width: 40%; animation: wave 1s infinite alternate; }
        @keyframes wave { 0% { width: 30%; } 100% { width: 85%; } }
        .btn { background: #00ffff; color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="panel">
        <h2>📡 QUANTUM SATELLITE SIGNAL INTERCEPTOR</h2>
        <div class="dish-radar"></div>
        <div class="freq-bar"><div class="freq-fill"></div></div>
        <p id="satStatus">FREQUENCY SYNC: ACTIVE (98.4 GHz)</p>
        <button class="btn" onclick="tuneFreq()">TUNE FREQUENCY</button>
        <br><br>
        <button class="btn" style="background:#ff3333; color:#fff;" onclick="window.location.href='advanced_dashboard.html'">_ BACK TO v2.0</button>
    </div>
    <script>
        function tuneFreq() {
            const f = (Math.random() * 200).toFixed(2);
            document.getElementById('satStatus').innerText = "FREQUENCY SYNC: ALTERED (" + f + " GHz) - SIGNAL SECURE!";
        }
    </script>
</body>
</html>
