<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula - Cyber Matrix</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: monospace; }
        body { background: #000; overflow: hidden; color: #00ff33; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        canvas { position: absolute; top: 0; left: 0; z-index: 1; }
        .overlay { position: relative; z-index: 2; background: rgba(0,0,0,0.85); border: 1px solid #00ff33; padding: 25px; text-align: center; max-width: 400px; width: 90%; box-shadow: 0 0 20px rgba(0,255,51,0.2); }
        .back-btn { margin-top: 20px; background: transparent; border: 1px solid #00ff33; color: #00ff33; padding: 8px 20px; cursor: pointer; font-weight: bold; }
        .back-btn:hover { background: #00ff33; color: #000; }
    </style>
</head>
<body>
    <canvas id="matrixCanvas"></canvas>
    <div class="overlay">
        <h3>[ NEBULA CORE MATRIX ]</h3>
        <p style="margin-top: 15px; font-size: 13px; color: #aaa;">STREAMING LIVE DECRYPTED DATA FLOW...</p>
        <div style="color: #ff3333; margin-top: 10px; font-size: 12px; font-weight: bold;">[ SYSTEM STABLE ]</div>
        <button class="back-btn" onclick="window.location.href='dashboard.html'">_ BACK</button>
    </div>

    <script>
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&";
        const fontSize = 14;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00ff33';
            ctx.font = fontSize + 'px monospace';

            drops.forEach((y, x) => {
                const text = letters[Math.floor(Math.random() * letters.length)];
                ctx.fillText(text, x * fontSize, y * fontSize);
                if (y * fontSize > canvas.height && Math.random() > 0.975) drops[x] = 0;
                drops[x]++;
            });
        }
        setInterval(drawMatrix, 33);
    </script>
</body>
</html>
