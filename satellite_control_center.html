<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula - Satellite Control Center</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
        body { background-color: #020205; color: #00ffff; min-height: 100vh; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .main-frame { width: 100%; max-width: 1300px; background: #000; border: 2px solid #00ffff; padding: 20px; box-shadow: 0 0 30px rgba(0,255,255,0.15); border-radius: 6px; }
        .header { text-align: center; border-bottom: 2px dashed #00ffff; padding-bottom: 15px; margin-bottom: 25px; }
        
        h2 { font-size: 1.4rem; letter-spacing: 3px; text-shadow: 0 0 10px #00ffff; }
        .alert-bar { background: #110000; border: 1px dashed #ff0055; color: #ff0055; padding: 10px; margin: 15px 0; text-align: center; font-weight: bold; font-size: 13px; }

        /* സെക്ഷൻ ടൈറ്റിലുകൾ */
        .section-title { font-size: 16px; color: #fff; border-left: 4px solid #ff0055; padding-left: 10px; margin-bottom: 15px; letter-spacing: 1px; }

        /* 20 സാറ്റലൈറ്റ് ഗ്രിഡ് */
        .satellite-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; margin-bottom: 40px; }
        .sat-card { background: #050b11; border: 1px solid #005577; padding: 15px; border-radius: 4px; position: relative; }
        .sat-card.offline { border-color: #ff0055; background: #150505; }
        
        .sat-header { display: flex; justify-content: space-between; border-bottom: 1px solid #005577; padding-bottom: 5px; margin-bottom: 10px; font-size: 12px; }
        .sat-mission { font-size: 11px; color: #ffff00; margin-bottom: 10px; }
        
        /* 8 കൺട്രോൾ സെറ്റപ്പുകൾ */
        .control-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 11px; }
        .ctrl-row { display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.4); padding: 4px; border: 1px solid #113344; }
        
        .lever-btn { background: #005577; color: #fff; border: none; padding: 2px 6px; cursor: pointer; font-size: 10px; font-weight: bold; }
        .lever-btn:hover { background: #00ffff; color: #000; }
        .status-indicator { color: #00ff33; font-weight: bold; }

        /* 30 പവർ ഗ്രിഡ് സെക്ഷൻ (താഴേക്ക് സ്ക്രോൾ ചെയ്യാൻ) */
        .power-scroll-area { height: 350px; overflow-y: auto; border: 1px solid #ff0055; background: #070105; padding: 15px; border-radius: 4px; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
        .power-switch-box { background: #000; border: 1px solid #331122; padding: 10px; display: flex; justify-content: space-between; align-items: center; font-size: 11px; }
        
        /* സിസ്റ്റം ലോഗ്സ് ഫീഡ് */
        .live-ticker { background: #050505; border: 1px solid #222; padding: 10px; margin-top: 20px; font-size: 12px; color: #888; height: 40px; overflow: hidden; }
        
        .btn-action { background: #ff0055; color: #000; border: none; padding: 3px 6px; font-weight: bold; cursor: pointer; font-size: 10px; }
        .btn-action.active { background: #00ff33; }
        
        .back-btn { margin-top: 20px; background: transparent; border: 1px solid #00ffff; color: #00ffff; padding: 10px 25px; cursor: pointer; font-weight: bold; }
        .back-btn:hover { background: #00ffff; color: #000; }
    </style>
</head>
<body>

    <div class="main-frame">
        <div class="header">
            <h2>[ GLOBAL SATELLITE COMMAND & ORBITAL CONTROL ]</h2>
            <p style="font-size: 11px; color: #666; margin-top: 5px;">STRATEGIC NETWORK ARRAYS & MULTI-COUNTRY DEFENSE UPLINKS</p>
        </div>

        <div class="alert-bar" id="masterAlert">STATUS: GLOBAL POWER MATRIX FULLY ARMED</div>

        <div class="section-title">📡 ORBITAL BLADE ARRAYS (20 ACTIVE CHANNELS)</div>
        <div class="satellite-grid" id="satGrid">
            </div>

        <div class="section-title">⚡ DOWNLINK MAIN POWER CHASSIS (30 CORES - SCROLLABLE)</div>
        <div class="power-scroll-area">
            <div class="grid-container" id="powerGrid">
                </div>
        </div>

        <div class="live-ticker" id="tickerFeed">> Monitoring orbital telemetries... Connection stable.</div>
    </div>

    <button class="back-btn" onclick="window.location.href='dashboard.html'">_ DISCONNECT CORE</button>

    <script>
        // 10 രാജ്യങ്ങളും അവയുടെ വ്യത്യസ്തമായ ഡാറ്റയും
        const countries = [
            { name: "INDIA", task: "Military Recon & Border Patrol", codes: ["ISRO-IND-A1", "ISRO-IND-B2"] },
            { name: "USA", task: "GPS Global Navigation Matrix", codes: ["NASA-USA-X1", "NASA-USA-Y2"] },
            { name: "JAPAN", task: "Tsunami Early Warning Array", codes: ["JAXA-JPN-M1", "JAXA-JPN-N2"] },
            { name: "GERMANY", task: "Quantum Encryption Comms", codes: ["DLR-GER-P1", "DLR-GER-Q2"] },
            { name: "FRANCE", task: "Deep Space Telescope Uplink", codes: ["CNES-FRA-E1", "CNES-FRA-F2"] },
            { name: "UK", task: "Maritime Weather Monitoring", codes: ["UKSA-GBR-C1", "UKSA-GBR-D2"] },
            { name: "CANADA", task: "Arctic Ice-Cap Radar Scan", codes: ["CSA-CAN-R1", "CSA-CAN-S2"] },
            { name: "AUSTRALIA", task: "Wildfire Thermal Tracking", codes: ["ASA-AUS-T1", "ASA-AUS-U2"] },
            { name: "BRAZIL", task: "Amazon Deforestation Radar", codes: ["AEB-BRZ-K1", "AEB-BRZ-L2"] },
            { name: "UAE", task: "Atmospheric Laser Comms", codes: ["UAESA-UAE-G1", "UAESA-UAE-H2"] }
        ];

        let powerGridStatus = Array(30).fill(true); // 30 പവർ ഗ്രിഡ് അവസ്ഥകൾ (true = ON)

        // 20 സാറ്റലൈറ്റുകൾ ജനറേറ്റ് ചെയ്യുന്നു
        function initSatellites() {
            const grid = document.getElementById('satGrid');
            grid.innerHTML = "";
            
            let satIndex = 0;
            countries.forEach(country => {
                for(let i = 0; i < 2; i++) {
                    satIndex++;
                    const satCode = country.codes[i];
                    
                    const card = document.createElement('div');
                    card.className = "sat-card";
                    card.id = `satCard_${satIndex}`;
                    card.innerHTML = `
                        <div class="sat-header">
                            <span style="color:#ff0055; font-weight:bold;">${country.name}</span>
                            <span style="color:#fff;">ID: ${satCode}</span>
                        </div>
                        <div class="sat-mission">⚙️ ${country.task}</div>
                        
                        <div class="control-panel">
                            <div class="ctrl-row"><span>1. PWR</span><span class="status-indicator" id="pwr_${satIndex}">ON</span></div>
                            <div class="ctrl-row"><span>2. SIG</span><span style="color:#ffff00;" id="sig_${satIndex}">100%</span></div>
                            
                            <div class="ctrl-row"><span>3. ALT (ലിവർ)</span>
                                <div>
                                    <button class="lever-btn" onclick="adjustStat('alt', ${satIndex}, 1)">▲</button>
                                    <button class="lever-btn" onclick="adjustStat('alt', ${satIndex}, -1)">▼</button>
                                </div>
                            </div>
                            <div class="ctrl-row"><span>VAL: <b id="val_alt_${satIndex}">420</b>km</span></div>

                            <div class="ctrl-row"><span>5. RNG (ലിവർ)</span>
                                <div>
                                    <button class="lever-btn" onclick="adjustStat('rng', ${satIndex}, 5)">▲</button>
                                    <button class="lever-btn" onclick="adjustStat('rng', ${satIndex}, -5)">▼</button>
                                </div>
                            </div>
                            <div class="ctrl-row"><span>VAL: <b id="val_rng_${satIndex}">85</b>°</span></div>

                            <div class="ctrl-row"><span>7. BEAM</span><button class="lever-btn" onclick="toggleOption(this)">WIDE</button></div>
                            <div class="ctrl-row"><span>8. CRYPTO</span><button class="lever-btn" onclick="toggleOption(this)">AES</button></div>
                        </div>
                    `;
                    grid.appendChild(card);
                }
            });
        }

        // 30 പവർ സ്വിച്ചുകൾ ജനറേറ്റ് ചെയ്യുന്നു
        function initPowerGrid() {
            const container = document.getElementById('powerGrid');
            container.innerHTML = "";
            for(let i = 1; i <= 30; i++) {
                const box = document.createElement('div');
                box.className = "power-switch-box";
                box.innerHTML = `
                    <span>⚡ CORE-GRID_0${i}</span>
                    <button class="btn-action active" id="pwrBtn_${i}" onclick="togglePowerGrid(${i})">ON</button>
                `;
                container.appendChild(box);
            }
        }

        // ലിവർ വാല്യൂ മാറ്റാൻ
        function adjustStat(type, index, diff) {
            const el = document.getElementById(`val_${type}_${index}`);
            let val = parseInt(el.innerText);
            el.innerText = val + diff;
            triggerTicker(`> Satellite #${index} ${type.toUpperCase()} modified to ${val + diff}`);
        }

        // ബട്ടൺ ഓപ്ഷനുകൾ മാറ്റാൻ
        function toggleOption(btn) {
            btn.innerText = btn.innerText === "WIDE" ? "NARROW" : btn.innerText === "NARROW" ? "WIDE" : btn.innerText === "AES" ? "RSA" : "AES";
        }

        // പവർ ഗ്രിഡ് സ്വിച്ച് മാറ്റിമറിക്കുമ്പോൾ സംഭവിക്കുന്നത്
        function togglePowerGrid(num) {
            const btn = document.getElementById(`pwrBtn_${num}`);
            const alertBar = document.getElementById('masterAlert');
            
            if(powerGridStatus[num-1]) {
                // OFF ആക്കുന്നു
                powerGridStatus[num-1] = false;
                btn.innerText = "OFF";
                btn.className = "btn-action";
                triggerTicker(`[CRITICAL] POWER GRID CORE_0${num} INACTIVATED!`);
            } else {
                // ON ആക്കുന്നു
                powerGridStatus[num-1] = true;
                btn.innerText = "ON";
                btn.className = "btn-action active";
                triggerTicker(`[RECOVERY] POWER GRID CORE_0${num} RESTORED.`);
            }

            // ഏതെങ്കിലും ഒരു ഗ്രിഡ് ഓഫ് ആയാൽ 20 സാറ്റലൈറ്റുകളെയും ബാധിക്കുന്ന ലോജിക്
            const anyGridOff = powerGridStatus.includes(false);
            for(let i = 1; i <= 20; i++) {
                const card = document.getElementById(`satCard_${i}`);
                const pwrInd = document.getElementById(`pwr_${i}`);
                const sigInd = document.getElementById(`sig_${i}`);
                
                if(anyGridOff) {
                    card.classList.add('offline');
                    pwrInd.innerText = "WARN";
                    pwrInd.style.color = "#ff0055";
                    sigInd.innerText = "24% (DROP)";
                    sigInd.style.color = "#ff0055";
                    alertBar.innerText = "⚠️ EMERGENCY: MAIN POWER MATRIX DEPLETED - ORBITAL DISRUPTION DETECTED!";
                    alertBar.style.color = "#ff0055";
                    alertBar.style.background = "#220005";
                } else {
                    card.classList.remove('offline');
                    pwrInd.innerText = "ON";
                    pwrInd.style.color = "#00ff33";
                    sigInd.innerText = "100%";
                    sigInd.style.color = "#ffff00";
                    alertBar.innerText = "STATUS: GLOBAL POWER MATRIX FULLY ARMED";
                    alertBar.style.color = "#00ffff";
                    alertBar.style.background = "#001111";
                }
            }
        }

        function triggerTicker(msg) {
            document.getElementById('tickerFeed').innerText = msg;
        }

        // എല്ലാം ഒന്നിച്ച് ലോഡ് ചെയ്യുന്നു
        window.onload = function() {
            initSatellites();
            initPowerGrid();
        };
    </script>
</body>
</html>
