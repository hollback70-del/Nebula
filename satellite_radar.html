<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula - Satellite Radar</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: monospace; }
        body { background: #050505; color: #ff0055; padding: 20px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .window { width: 100%; max-width: 450px; background: #000; border: 1px solid #ff0055; padding: 25px; box-shadow: 0 0 15px rgba(255,0,85,0.1); text-align: center; border-radius: 4px; }
        h2 { font-size: 1.1rem; margin-bottom: 20px; }
        
        /* റഡാർ ആനിമേഷൻ */
        .radar-circle { 
            width: 160px; height: 160px; border: 2px solid #ff0055; border-radius: 50%; margin: 20px auto; position: relative; overflow: hidden; 
            background: radial-gradient(circle, rgba(255,0,85,0.05) 10%, transparent 80%);
        }
        .radar-circle::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, rgba(255,0,85,0.3) 0%, transparent 50%);
            transform-origin: center; animation: radar-scan 3s linear infinite;
        }
        @keyframes radar-scan { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .status-feed { font-size: 12px; color: #aaa; margin-top: 15px; height: 40px; }
        .back-btn { margin-top: 20px; background: transparent; border: 1px solid #ff0055; color: #ff0055; padding: 8px 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="window">
        <h2>[ SATELLITE UPLINK RADAR ]</h2>
        <div class="radar-circle"></div>
        <div class="status-feed" id="radarStatus">> INITIALIZING SCAN...</div>
    </div>
    <button class="back-btn" onclick="window.location.href='dashboard.html'">_ BACK</button>

    <script>
        const statusArr = [
            "> SCANNING ORBITAL NODE 01... OK",
            "> FEED STABLE: METEOROLOGICAL ARRAY CONNECTED",
            "> UPLINK SECURED VIA SAT-CH-04",
            "> TARGET ACQUISITION: INACTIVE"
        ];
        let i = 0;
        setInterval(() => {
            document.getElementById('radarStatus').innerText = statusArr[i];
            i = (i + 1) % statusArr.length;
        }, 2500);
    </script>
</body>
</html>
