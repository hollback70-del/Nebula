<!DOCTYPE httml>
<html lang ="ml">
<head>
    <meta charset ="UTF -8">
    <meta name ="viewport" conten ="width =device-with,initial-scale =1.0">

    <title>Terminal Access - Secure Login</title>
    <style>
        /* അടിസ്ഥാന ക്രമീകരണങ്ങൾ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: #00ff33;
        }

        /* പശ്ചാത്തലത്തിലെ ആനിമേഷൻ ലൈനുകൾ */
        .bg-lines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0, 255, 51, 0.03) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0, 255, 51, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
            z-index: 1;
        }

        /* ലോഗിൻ ബോക്സ് */
        .login-container {
            position: relative;
            background: rgba(10, 10, 10, 0.9);
            border: 2px solid #00ff33;
            padding: 40px;
            border-radius: 5px;
            width: 350px;
            box-shadow: 0 0 20px rgba(0, 255, 51, 0.2);
            z-index: 10;
            animation: fadeIn 1.5s ease-in-out;
        }

        /* ടൈറ്റിൽ ആനിമേഷൻ */
        h2 {
            text-align: center;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 8px rgba(0, 255, 51, 0.6);
        }

        /* ഇൻപുട്ട് ഫീൽഡുകൾ */
        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        .input-group input {
            width: 100%;
            padding: 10px 5px;
            background: transparent;
            border: none;
            border-bottom: 2px solid #005511;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        /* ഇൻപുട്ടിൽ ക്ലിക്ക് ചെയ്യുമ്പോൾ ഉള്ള ആനിമേഷൻ */
        .input-group input:focus {
            border-bottom-color: #00ff33;
            box-shadow: 0 1px 0 #00ff33;
        }

        .input-group label {
            position: absolute;
            top: 10px;
            left: 5px;
            color: #008822;
            pointer-events: none;
            transition: 0.3s;
        }

        .input-group input:focus ~ label,
        .input-group input:valid ~ label {
            top: -15px;
            font-size: 12px;
            color: #00ff33;
            text-shadow: 0 0 5px rgba(0, 255, 51, 0.4);
        }

        /* ബട്ടൺ */
        button {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 2px solid #00ff33;
            color: #00ff33;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 1px;
            transition: 0.4s;
            text-transform: uppercase;
            box-shadow: inset 0 0 0 0 rgba(0, 255, 51, 0.2);
        }

        button:hover {
            background: #00ff33;
            color: #050505;
            box-shadow: 0 0 15px #00ff33;
        }

        /* ആനിമേഷനുകൾ */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="bg-lines"></div>

    <div class="login-container">
        <h2>SYSTEM ACCESS</h2>
        <form onsubmit="event.preventDefault();">
            <div class="input-group">
                <input type="text" required>
                <label>USERNAME</label>
            </div>
            <div class="input-group">
                <input type="password" required>
                <label>ACCESS CODE</label>
            </div>
            <button type="submit">INITIALIZE</button>
        </form>
    </div>

</body>
</html>
