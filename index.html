<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Access - Secure Login</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: #00ff33;
        }

        .bg-lines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0, 255, 51, 0.03) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0, 255, 51, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
            z-index: 1;
        }

        .login-container {
            position: relative;
            background: rgba(10, 10, 10, 0.9);
            border: 2px solid #00ff33;
            padding: 40px;
            border-radius: 5px;
            width: 350px;
            box-shadow: 0 0 20px rgba(0, 255, 51, 0.2);
            z-index: 10;
            animation: fadeIn 1.5s ease-in-out;
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 8px rgba(0, 255, 51, 0.6);
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        .input-group input {
            width: 100%;
            padding: 10px 5px;
            background: transparent;
            border: none;
            border-bottom: 2px solid #005511;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-bottom-color: #00ff33;
            box-shadow: 0 1px 0 #00ff33;
        }

        .input-group label {
            position: absolute;
            top: 10px;
            left: 5px;
            color: #008822;
            pointer-events: none;
            transition: 0.3s;
        }

        .input-group input:focus ~ label,
        .input-group input:valid ~ label {
            top: -15px;
            font-size: 12px;
            color: #00ff33;
            text-shadow: 0 0 5px rgba(0, 255, 51, 0.4);
        }

        button {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 2px solid #00ff33;
            color: #00ff33;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 1px;
            transition: 0.4s;
            text-transform: uppercase;
        }

        button:hover {
            background: #00ff33;
            color: #050505;
            box-shadow: 0 0 15px #00ff33;
        }

        #errorMessage {
            color: #ff3333;
            font-size: 13px;
            text-align: center;
            margin-top: 15px;
            min-height: 20px;
            font-weight: bold;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="bg-lines"></div>

    <div class="login-container">
        <h2>SYSTEM ACCESS</h2>
        <form id="secureLoginForm">
            <div class="input-group">
                <input type="text" id="username" required autocomplete="off">
                <label>USERNAME</label>
            </div>
            <div class="input-group">
                <input type="password" id="accessCode" required autocomplete="off">
                <label>ACCESS CODE</label>
            </div>
            <button type="submit">INITIALIZE</button>
            <div id="errorMessage"></div>
        </form>
    </div>

    <script>
        // രഹസ്യ കീ (Encryption Key)
        const SECRET_KEY = "nebula_cyber_key";

        // ടെക്സ്റ്റിനെ ബൈനറി (01010) ആക്കാനുള്ള ഫങ്ക്ഷൻ
        function textToBinary(text) {
            return text.split('').map(char => {
                return char.charCodeAt(0).toString(2).padStart(8, '0');
            }).join(' ');
        }

        // ബൈനറിയെ തിരിച്ച് ടെക്സ്റ്റ് ആക്കാനുള്ള ഫങ്ക്ഷൻ
        function binaryToText(binary) {
            return binary.split(' ').map(bin => {
                return String.fromCharCode(parseInt(bin, 2));
            }).join('');
        }

        // ആദ്യമായി സൈറ്റ് ഓപ്പൺ ചെയ്യുമ്പോൾ ഒരു സുരക്ഷിത അഡ്മിൻ ഡാറ്റ ഉണ്ടാക്കി ബ്രൗസറിൽ വെക്കുന്നു
        function initializeLocalDatabase() {
            if (!localStorage.getItem('secure_vault')) {
                const defaultUser = "admin";
                const defaultCode = "nebula70";
                
                // 1. AES എൻക്രിപ്ഷൻ ചെയ്യുന്നു
                const encrypted = CryptoJS.AES.encrypt(`${defaultUser}:${defaultCode}`, SECRET_KEY).toString();
                // 2. ബൈനറി രൂപത്തിലേക്ക് മാറ്റുന്നു
                const binaryData = textToBinary(encrypted);
                
                // ബ്രൗസർ ഡാറ്റാബേസിൽ (localStorage) സേവ് ചെയ്യുന്നു
                localStorage.setItem('secure_vault', binaryData);
                console.log("[SYSTEM] Secure Binary Database Initialized.");
            }
        }

        initializeLocalDatabase();

        let loginAttempts = 0;
        const MAX_ATTEMPTS = 3;

        document.getElementById('secureLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const usernameInput = document.getElementById('username').value.trim();
            const accessCodeInput = document.getElementById('accessCode').value.trim();
            const errorDiv = document.getElementById('errorMessage');

            //Anti-SQL Injection Security
            const securePattern = /^[a-zA-Z0-9_]+$/;
            if (!securePattern.test(usernameInput) || !securePattern.test(accessCodeInput)) {
                errorDiv.innerText = "MALICIOUS INPUT DETECTED! ACCESS DENIED.";
                return;
            }

            if (loginAttempts >= MAX_ATTEMPTS) {
                errorDiv.innerText = "SYSTEM LOCKED DUE TO TOO MANY ATTEMPTS.";
                return;
            }

            // --- ഡാറ്റാബേസിൽ നിന്നുള്ള വെരിഫിക്കേഷൻ ---
            // 1. ബ്രൗസറിലെ ബൈനറി ഡാറ്റ എടുക്കുന്നു
            const storedBinary = localStorage.getItem('secure_vault');
            // 2. ബൈനറി മാറ്റി എൻക്രിപ്റ്റ് ചെയ്ത ടെക്സ്റ്റ് ആക്കുന്നു
            const encryptedText = binaryToText(storedBinary);
            // 3. ഡിക്രിപ്റ്റ് ചെയ്ത് യഥാർത്ഥ യൂസർനെയിമും പാസ്‌വേഡും എടുക്കുന്നു
            const bytes = CryptoJS.AES.decrypt(encryptedText, SECRET_KEY);
            const decryptedData = bytes.toString(CryptoJS.enc.Utf8);
            
            const [storedUser, storedCode] = decryptedData.split(':');

            // ഒത്തുനോക്കുന്നു
            if (usernameInput === storedUser && accessCodeInput === storedCode) {
                errorDiv.style.color = "#00ff33";
                errorDiv.innerText = "ACCESS GRANTED. REDIRECTING...";
                
                setTimeout(function() {
                    window.location.href = "dashboard.html";
                }, 1500);
            } else {
                loginAttempts++;
                const remaining = MAX_ATTEMPTS - loginAttempts;
                if (remaining <= 0) {
                    errorDiv.innerText = "SYSTEM LOCKED.";
                } else {
                    errorDiv.innerText = `INVALID CREDENTIALS. ${remaining} ATTEMPTS LEFT.`;
                }
            }
        });
    </script>
</body>
</html>
