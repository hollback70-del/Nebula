<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Access - Secure Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: #00ff33;
        }

        .bg-lines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0, 255, 51, 0.03) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0, 255, 51, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
            z-index: 1;
        }

        .login-container {
            position: relative;
            background: rgba(10, 10, 10, 0.9);
            border: 2px solid #00ff33;
            padding: 40px;
            border-radius: 5px;
            width: 350px;
            box-shadow: 0 0 20px rgba(0, 255, 51, 0.2);
            z-index: 10;
            animation: fadeIn 1.5s ease-in-out;
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 8px rgba(0, 255, 51, 0.6);
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        .input-group input {
            width: 100%;
            padding: 10px 5px;
            background: transparent;
            border: none;
            border-bottom: 2px solid #005511;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-bottom-color: #00ff33;
            box-shadow: 0 1px 0 #00ff33;
        }

        .input-group label {
            position: absolute;
            top: 10px;
            left: 5px;
            color: #008822;
            pointer-events: none;
            transition: 0.3s;
        }

        .input-group input:focus ~ label,
        .input-group input:valid ~ label {
            top: -15px;
            font-size: 12px;
            color: #00ff33;
            text-shadow: 0 0 5px rgba(0, 255, 51, 0.4);
        }

        button {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 2px solid #00ff33;
            color: #00ff33;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 1px;
            transition: 0.4s;
            text-transform: uppercase;
        }

        button:hover {
            background: #00ff33;
            color: #050505;
            box-shadow: 0 0 15px #00ff33;
        }

        #errorMessage {
            color: #ff3333;
            font-size: 13px;
            text-align: center;
            margin-top: 15px;
            min-height: 20px;
            font-weight: bold;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="bg-lines"></div>

    <div class="login-container">
        <h2>SYSTEM ACCESS</h2>
        <form id="secureLoginForm">
            <div class="input-group">
                <input type="text" id="username" required autocomplete="off">
                <label>USERNAME</label>
            </div>
            <div class="input-group">
                <input type="password" id="accessCode" required autocomplete="off">
                <label>ACCESS CODE</label>
            </div>
            <button type="submit">INITIALIZE</button>
            <div id="errorMessage"></div>
        </form>
    </div>

    <script>
        // താല്കാലികമായി നമ്മൾ സെറ്റ് ചെയ്യുന്ന ലോഗിൻ വിവരങ്ങൾ
        const VALID_USER = "admin";
        const VALID_CODE = "nebula70";

        let loginAttempts = 0;
        const MAX_ATTEMPTS = 3; // 3 തവണ തെറ്റിയാൽ ബ്ലോക്ക് ചെയ്യും (Anti-Brute Force)

        document.getElementById('secureLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const usernameInput = document.getElementById('username').value.trim();
            const accessCodeInput = document.getElementById('accessCode').value.trim();
            const errorDiv = document.getElementById('errorMessage');

            // സെക്യൂരിറ്റി ചെക്ക്: ഇൻപുട്ടിൽ സ്പെഷ്യൽ ക്യാരക്ടറുകൾ വരുന്നുണ്ടോ എന്ന് നോക്കുന്നു (Anti-SQL Injection)
            const securePattern = /^[a-zA-Z0-9_]+$/;
            if (!securePattern.test(usernameInput) || !securePattern.test(accessCodeInput)) {
                errorDiv.innerText = "MALICIOUS INPUT DETECTED! ACCESS DENIED.";
                return;
            }

            if (loginAttempts >= MAX_ATTEMPTS) {
                errorDiv.innerText = "SYSTEM LOCKED DUE TO TOO MANY ATTEMPTS.";
                return;
            }

            // ലോഗിൻ പരിശോധന
            if (usernameInput === VALID_USER && accessCodeInput === VALID_CODE) {
                errorDiv.style.color = "#00ff33";
                errorDiv.innerText = "ACCESS GRANTED. REDIRECTING...";
                
                // 1.5 സെക്കന്റിന് ശേഷം അടുത്ത പേജിലേക്ക് ഓട്ടോമാറ്റിക്കായി പോകും
                setTimeout(function() {
                    window.location.href = "dashboard.html";
                }, 1500);
            } else {
                loginAttempts++;
                const remaining = MAX_ATTEMPTS - loginAttempts;
                if (remaining <= 0) {
                    errorDiv.innerText = "SYSTEM LOCKED.";
                } else {
                    errorDiv.innerText = `INVALID CREDENTIALS. ${remaining} ATTEMPTS LEFT.`;
                }
            }
        });
    </script>
</body>
</html>
