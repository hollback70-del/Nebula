<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula - Secure Vault</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: monospace; }
        body { background: #050505; color: #ff9900; padding: 20px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .window { width: 100%; max-width: 500px; background: #000; border: 1px solid #ff9900; padding: 25px; box-shadow: 0 0 15px rgba(255,153,0,0.1); border-radius: 4px; }
        h2 { font-size: 1.2rem; margin-bottom: 15px; text-align: center; }
        textarea { width: 100%; background: #110a00; border: 1px solid #332200; height: 100px; padding: 10px; color: #fff; outline: none; resize: none; margin-bottom: 10px; }
        button { background: #ff9900; border: none; color: #000; padding: 10px 15px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 20px; }
        .vault-list { border-top: 1px dashed #332200; padding-top: 15px; text-align: left; }
        .vault-item { background: #110a00; border: 1px solid #ff9900; padding: 10px; margin-bottom: 8px; font-size: 12px; color: #ccc; position: relative; }
        .del-btn { position: absolute; right: 10px; top: 10px; color: #ff3333; cursor: pointer; font-weight: bold; }
        .back-btn { margin-top: 20px; background: transparent; border: 1px solid #ff9900; color: #ff9900; padding: 8px 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="window">
        <h2>[ ENCRYPTED CLOUD VAULT ]</h2>
        <textarea id="vaultText" placeholder="രഹസ്യ വിവരങ്ങൾ ഇവിടെ രേഖപ്പെടുത്താം..."></textarea>
        <button onclick="saveToVault()">SAVE TO VAULT</button>
        <div class="vault-list" id="vaultList"></div>
    </div>
    <button class="back-btn" onclick="window.location.href='dashboard.html'">_ BACK</button>

    <script>
        function saveToVault() {
            const text = document.getElementById('vaultText').value.trim();
            if(!text) return;
            let vaultData = JSON.parse(localStorage.getItem('nebulaVault') || "[]");
            vaultData.push({ id: Date.now(), content: text });
            localStorage.setItem('nebulaVault', JSON.stringify(vaultData));
            document.getElementById('vaultText').value = "";
            loadVault();
        }
        function loadVault() {
            const list = document.getElementById('vaultList');
            list.innerHTML = "";
            let vaultData = JSON.parse(localStorage.getItem('nebulaVault') || "[]");
            if(vaultData.length === 0) { list.innerHTML = "<p style='color:#666; font-size:12px; text-align:center;'>Vault ഒഴിഞ്ഞുകിടക്കുകയാണ്...</p>"; return; }
            vaultData.forEach(item => {
                const div = document.createElement('div');
                div.className = "vault-item";
                div.innerHTML = `<div><b>[SECURE DATA]</b><br>${item.content}</div><span class="del-btn" onclick="deleteVault(${item.id})">X</span>`;
                list.appendChild(div);
            });
        }
        function deleteVault(id) {
            let vaultData = JSON.parse(localStorage.getItem('nebulaVault') || "[]");
            vaultData = vaultData.filter(item => item.id !== id);
            localStorage.setItem('nebulaVault', JSON.stringify(vaultData));
            loadVault();
        }
        window.onload = loadVault;
    </script>
</body>
</html>
