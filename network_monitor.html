<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula - Network Traffic Monitor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: monospace; }
        body { background: #050505; color: #ffff00; padding: 20px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .window { width: 100%; max-width: 800px; background: #000; border: 1px solid #ffff00; padding: 20px; box-shadow: 0 0 15px rgba(255,255,0,0.1); border-radius: 4px; }
        h2 { font-size: 1.2rem; margin-bottom: 15px; letter-spacing: 1px; text-align: center; }
        .log-box { height: 350px; background: #0a0a00; border: 1px solid #333; padding: 15px; overflow-y: auto; font-size: 13px; color: #ccff00; line-height: 1.6; }
        .stats { margin-top: 15px; display: flex; justify-content: space-between; font-size: 12px; color: #888; border-top: 1px dashed #333; padding-top: 10px; }
        .back-btn { margin-top: 20px; background: transparent; border: 1px solid #ffff00; color: #ffff00; padding: 8px 20px; cursor: pointer; font-weight: bold; }
        .back-btn:hover { background: #ffff00; color: #000; }
    </style>
</head>
<body>
    <div class="window">
        <h2>[ LIVE NETWORK TRAFFIC MONITOR ]</h2>
        <div class="log-box" id="logBox"></div>
        <div class="stats">
            <span>PACKETS ANALYZED: <style-data id="pCount">0</style-data></span>
            <span>STATUS: INTENSITY NOMINAL</span>
            <span>GATEWAY: ACTIVE</span>
        </div>
    </div>
    <button class="back-btn" onclick="window.location.href='dashboard.html'">_ BACK</button>

    <script>
        const logBox = document.getElementById('logBox');
        let count = 0;
        const ips = ["192.168.1.45", "10.0.0.12", "172.16.254.1", "192.168.10.110", "10.0.2.15"];
        const protocols = ["TCP", "UDP", "HTTPS", "SSH", "FTP"];
        
        function addLog() {
            const randomIp = ips[Math.floor(Math.random() * ips.length)];
            const proto = protocols[Math.floor(Math.random() * protocols.length)];
            const size = Math.floor(Math.random() * 500) + 40;
            const time = new Date().toLocaleTimeString();
            
            const logRow = document.createElement('p');
            logRow.innerHTML = `[${time}] <span style="color:#fff;">${randomIp}</span> -> INBOUND PACKET VIA <span style="color:#ff3333;">${proto}</span> [${size} Bytes] - <span style="color:#00ff33;">PASSED</span>`;
            logBox.appendChild(logRow);
            
            count++;
            document.getElementById('pCount').innerText = count;
            logBox.scrollTop = logBox.scrollHeight;
            
            if(logBox.childNodes.length > 50) logBox.removeChild(logBox.firstChild);
        }
        setInterval(addLog, 1200);
    </script>
</body>
</html>
