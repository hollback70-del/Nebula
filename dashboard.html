<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula - Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: #050505;
            color: #00ff33;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            overflow-y: auto; 
            user-select: none;
        }

        /* മുകളിലെ ബട്ടണുകൾ വെക്കാനുള്ള കണ്ടെയ്നർ */
        .top-nav {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
        }

        .row-nav {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            width: 100%;
        }

        .terminal-btn {
            background: rgba(0, 255, 51, 0.1);
            border: 2px dashed #00ff33;
            color: #00ff33;
            padding: 12px 30px;
            cursor: pointer;
            font-weight: bold;
            letter-spacing: 2px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .terminal-btn:hover {
            background: #00ff33;
            color: #000;
            box-shadow: 0 0 20px #00ff33;
        }

        .root-btn {
            border-color: #ff0000;
            color: #ff0000;
            background: rgba(255, 0, 0, 0.05);
        }

        .root-btn:hover {
            background: #ff0000;
            color: #000;
            box-shadow: 0 0 20px #ff0000;
        }

        .chat-btn {
            border-color: #00ccff;
            color: #00ccff;
            background: rgba(0, 204, 255, 0.05);
            width: auto;
            max-width: 400px;
        }

        .chat-btn:hover {
            background: #00ccff;
            color: #000;
            box-shadow: 0 0 20px #00ccff;
        }

        .main-content {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2rem;
            letter-spacing: 4px;
            text-shadow: 0 0 10px rgba(0, 255, 51, 0.7);
            margin-bottom: 20px;
        }

        .status-box {
            border: 1px dashed #00ff33;
            padding: 20px;
            background: rgba(0, 20, 0, 0.4);
            font-size: 14px;
        }

        .bottom-nav {
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .profile-link-btn {
            background: transparent;
            border: 1px solid #00ff33;
            color: #00ff33;
            padding: 12px 25px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .profile-link-btn:hover {
            background: #00ff33;
            color: #000;
            box-shadow: 0 0 15px #00ff33;
        }

        .logs-btn {
            border-color: #00ff33;
            background: rgba(0, 255, 51, 0.05);
        }

        .icon {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <div class="row-nav">
            <button class="terminal-btn" onclick="window.location.href='terminal.html'">_ OPEN CORE TERMINAL</button>
            <button class="terminal-btn root-btn" onclick="window.location.href='root_terminal.html'"># OPEN ROOT TERMINAL</button>
        </div>
        <button class="terminal-btn chat-btn" onclick="window.location.href='signup.html'">@ OPEN GLOBAL CHAT HUB</button>
    </div>

    <div class="main-content">
        <h1>NEBULA HUB ACTIVE</h1>
        <div class="status-box">
            <p>> SYSTEM CHECK... OK</p>
            <p>> SECURITY... ARMED</p>
            <p>> DATA ENCRYPTION... ACTIVE</p>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="profile.html" class="profile-link-btn">
            <svg class="icon" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            Account Profile
        </a>

        <a href="view_logs.html" class="profile-link-btn logs-btn">
            <svg class="icon" viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
            System Logs
        </a>

        <a href="student_portal.html" class="profile-link-btn" style="border-color: #ff00ea; color: #ff00ea; background: rgba(255, 0, 234, 0.05);">
            <svg class="icon" viewBox="0 0 24 24"><path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3zM5.47 11.42L12 15l6.53-3.58-6.53-3.56-6.53 3.56zM12 18c-3.31 0-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8h-2c0 3.31-2.69 6-6 6z"/></svg>
            Student Registry Portal
        </a>

        <a href="graph.html" class="profile-link-btn" style="border-color: #00ff33; color: #00ff33; background: rgba(0, 255, 51, 0.05);">
            <svg class="icon" viewBox="0 0 24 24"><path d="M5 9.2h3V19H5zM10.5 5h3v14h-3zm5.5 8h3v6h-3zM2 21h19v2H2z"/></svg>
            Visual Analytics Graph
        </a>
                <a href="school_registry.html" class="profile-link-btn" style="border-color: #00ccff; color: #00ccff; background: rgba(0, 204, 255, 0.05);">
            <svg class="icon" viewBox="0 0 24 24"><path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3zM5.47 11.42L12 15l6.53-3.58-6.53-3.56-6.53 3.56zM12 18c-3.31 0-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8h-2c0 3.31-2.69 6-6 6z"/></svg>
            School & Teacher Registry
        </a>

    </div>

    <script>
        let lastTap = 0;
        document.body.addEventListener('click', function (e) {
            if (e.target.tagName === 'A' || e.target.tagName === 'BUTTON' || e.target.closest('a')) return;
            const now = new Date().getTime();
            const timesince = now - lastTap;
            if ((timesince < 300) && (timesince > 0)) { window.location.href = "kali_info.html"; }
            lastTap = now;
        });

        document.body.addEventListener('touchend', function (e) {
            if (e.target.tagName === 'A' || e.target.tagName === 'BUTTON' || e.target.closest('a')) return;
            const now = new Date().getTime();
            const timesince = now - lastTap;
            if ((timesince < 300) && (timesince > 0)) { window.location.href = "kali_info.html"; }
            lastTap = now;
        });
    </script>
</body>
</html>
