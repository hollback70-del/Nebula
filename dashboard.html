<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula - Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: #050505;
            color: #00ff33;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 20px 20px 40px 20px;
            user-select: none;
        }

        /* മുകളിലെ ബട്ടണുകൾ ഒന്നിച്ച് വെക്കാനുള്ള പുതിയ കണ്ടെയ്നർ */
        .top-nav {
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 15px; /* രണ്ട് ബട്ടണുകൾ തമ്മിലുള്ള അകലം */
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .terminal-btn {
            background: rgba(0, 255, 51, 0.1);
            border: 2px dashed #00ff33;
            color: #00ff33;
            padding: 12px 30px;
            cursor: pointer;
            font-weight: bold;
            letter-spacing: 2px;
            transition: 0.3s;
            text-transform: uppercase;
            font-family: 'Courier New', monospace;
        }

        .terminal-btn:hover {
            background: #00ff33;
            color: #000;
            box-shadow: 0 0 20px #00ff33;
        }

        /* റൂട്ട് ടെർമിനൽ ബട്ടണിന് മാത്രമായി റെഡ് ഡിസൈൻ */
        .root-btn {
            border-color: #ff0000;
            color: #ff0000;
            background: rgba(255, 0, 0, 0.05);
        }

        .root-btn:hover {
            background: #ff0000;
            color: #000;
            box-shadow: 0 0 20px #ff0000;
        }

        .main-content {
            text-align: center;
            margin-top: auto;
            margin-bottom: auto;
        }

        h1 {
            font-size: 2rem;
            letter-spacing: 4px;
            text-shadow: 0 0 10px rgba(0, 255, 51, 0.7);
            margin-bottom: 20px;
        }

        .status-box {
            border: 1px dashed #00ff33;
            padding: 20px;
            background: rgba(0, 20, 0, 0.4);
            font-size: 14px;
        }

        .bottom-nav {
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .profile-link-btn {
            background: transparent;
            border: 1px solid #00ff33;
            color: #00ff33;
            padding: 12px 25px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .profile-link-btn:hover {
            background: #00ff33;
            color: #000;
            box-shadow: 0 0 15px #00ff33;
        }

        .logs-btn {
            border-color: #00ff33;
            background: rgba(0, 255, 51, 0.05);
        }

        .icon {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <button class="terminal-btn" onclick="window.location.href='terminal.html'">_ OPEN CORE TERMINAL</button>
        <button class="terminal-btn root-btn" onclick="window.location.href='root_terminal.html'"># OPEN ROOT TERMINAL</button>
    </div>

    <div class="main-content">
        <h1>NEBULA HUB ACTIVE</h1>
        <div class="status-box">
            <p>> SYSTEM CHECK... OK</p>
            <p>> SECURITY... ARMED</p>
            <p>> DATA ENCRYPTION... ACTIVE</p>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="profile.html" class="profile-link-btn">
            <svg class="icon" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            Account Profile
        </a>

        <a href="view_logs.html" class="profile-link-btn logs-btn">
            <svg class="icon" viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
            System Logs
        </a>
    </div>

    <script>
        let lastTap = 0;
        
        document.body.addEventListener('click', function (e) {
            if (e.target.tagName === 'A' || e.target.tagName === 'BUTTON' || e.target.closest('a')) return;

            const now = new Date().getTime();
            const timesince = now - lastTap;
            
            if ((timesince < 300) && (timesince > 0)) {
                window.location.href = "kali_info.html";
            }
            lastTap = now;
        });

        document.body.addEventListener('touchend', function (e) {
            if (e.target.tagName === 'A' || e.target.tagName === 'BUTTON' || e.target.closest('a')) return;
            
            const now = new Date().getTime();
            const timesince = now - lastTap;
            
            if ((timesince < 300) && (timesince > 0)) {
                window.location.href = "kali_info.html";
            }
            lastTap = now;
        });
    </script>
</body>
</html>
