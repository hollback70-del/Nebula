<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula - User Profile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', monospace;
        }

        body {
            background-color: #050505;
            color: #00ff33;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }

        .profile-card {
            background: rgba(10, 10, 10, 0.95);
            border: 2px solid #00ff33;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 0 25px rgba(0, 255, 51, 0.2);
            position: relative;
        }

        .profile-image {
            width: 100px;
            height: 100px;
            border: 2px solid #00ff33;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0, 255, 51, 0.05);
        }

        .profile-image svg {
            width: 60px;
            height: 60px;
            fill: #00ff33;
        }

        h2 {
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #004411;
            font-size: 14px;
        }

        .info-row span:first-child {
            color: #008822;
        }

        .info-row span:last-child {
            color: #ffffff;
        }

        .btn-group {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .row-btn {
            display: flex;
            gap: 15px;
            width: 100%;
        }

        .btn {
            flex: 1;
            padding: 10px;
            border: 1px solid #00ff33;
            background: transparent;
            color: #00ff33;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn:hover {
            background: #00ff33;
            color: #000;
        }

        .media-btn {
            background: rgba(0, 255, 51, 0.1);
            border-width: 2px;
            box-shadow: 0 0 10px rgba(0, 255, 51, 0.3);
        }

        .logout {
            border-color: #ff3333;
            color: #ff3333;
        }

        .logout:hover {
            background: #ff3333;
            color: #000;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="profile-image">
            <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        </div>
        
        <h2>USER PROFILE</h2>
        
        <div class="info-row">
            <span>ID:</span>
            <span>NEBULA-X-070</span>
        </div>
        <div class="info-row">
            <span>STATUS:</span>
            <span>AUTHORIZED</span>
        </div>
        <div class="info-row">
            <span>CLEARANCE:</span>
            <span>LEVEL 5</span>
        </div>
        <div class="info-row">
            <span>DATABASE:</span>
            <span>KALI_DB_LIVE</span>
        </div>

        <div class="btn-group">
            <button class="btn media-btn" onclick="window.location.href='media_zone.html'">ENTER MEDIA ZONE</button>
            
            <div class="row-btn">
                <button class="btn" onclick="window.location.href='dashboard.html'">BACK</button>
                <button class="btn logout" onclick="window.location.href='index.html'">LOGOUT</button>
            </div>
        </div>
    </div>

</body>
</html>
