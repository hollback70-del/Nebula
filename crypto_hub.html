<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula - Crypto Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: monospace; }
        body { background: #050505; color: #00ffff; padding: 20px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .window { width: 100%; max-width: 450px; background: #000; border: 1px solid #00ffff; padding: 25px; box-shadow: 0 0 15px rgba(0,255,255,0.1); border-radius: 4px; }
        h2 { font-size: 1.2rem; margin-bottom: 20px; text-align: center; }
        input { width: 100%; background: #0a1111; border: 1px solid #113333; padding: 12px; color: #fff; margin-bottom: 15px; outline: none; }
        input:focus { border-color: #00ffff; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 15px; }
        button { flex: 1; background: #00ffff; border: none; color: #000; padding: 12px; font-weight: bold; cursor: pointer; }
        .output { background: #0a1111; border: 1px dashed #00ffff; padding: 15px; word-break: break-all; min-height: 50px; font-size: 14px; color: #fff; }
        .back-btn { margin-top: 20px; background: transparent; border: 1px solid #00ffff; color: #00ffff; padding: 8px 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="window">
        <h2>[ CRYPTOGRAPHY ENGINE ]</h2>
        <input type="text" id="cryptoInput" placeholder="വാക്കുകൾ ഇവിടെ നൽകുക...">
        <div class="btn-group">
            <button onclick="encryptData()">ENCRYPT</button>
            <button onclick="decryptData()" style="background:transparent; border:1px solid #00ffff; color:#00ffff;">DECRYPT</button>
        </div>
        <div class="output" id="cryptoOutput">> Output awaiting command...</div>
    </div>
    <button class="back-btn" onclick="window.location.href='dashboard.html'">_ BACK</button>

    <script>
        function encryptData() {
            const val = document.getElementById('cryptoInput').value;
            if(!val) return;
            // ലളിതമായ Base64 എൻക്രിപ്ഷൻ
            document.getElementById('cryptoOutput').innerText = btoa(unescape(encodeURIComponent(val)));
        }
        function decryptData() {
            const val = document.getElementById('cryptoInput').value;
            if(!val) return;
            try {
                document.getElementById('cryptoOutput').innerText = decodeURIComponent(escape(atob(val)));
            } catch(e) {
                document.getElementById('cryptoOutput').innerText = "[ERROR: അസാധുവായ കോഡ്!]";
            }
        }
    </script>
</body>
</html>
